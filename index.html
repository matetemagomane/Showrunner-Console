<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showrunner | Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-wrapper">
        <div class="brand-hero">
            <h1>Show<span>runner</span></h1>
            <p>Your Personal TV Show Library</p>
        </div>

        <div class="login-card">
            <div class="login-header">
                <h2>Sign In</h2>
                <p>Please log in to manage your dashboard.</p>
            </div>

            <form id="gatewayLoginForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="e.g., admin_user" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="action-btn primary-btn">Sign In</button>
            </form>

            <div class="login-footer">
                <p>Secure Access</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('gatewayLoginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
